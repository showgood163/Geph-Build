name: Auto-build Upstream geph5-client

on:
  schedule:
    - cron: '0 * * * *' # Automatically check for updates every hour
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Specific version to build (e.g., 0.2.36). Leave empty for latest.'
        type: string
        required: false
      force_build:
        description: 'Force a build regardless of version changes'
        type: boolean
        default: false

jobs:
  check-updates:
    name: Check Upstream Tags
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Detect upstream tag
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_VERSION="${{ github.event.inputs.target_version }}"
          FORCE_BUILD="${{ github.event.inputs.force_build }}"
          
          if [ -n "$TARGET_VERSION" ]; then
            # Format the target version properly to match upstream tags
            if [[ "$TARGET_VERSION" == geph5-client-* ]]; then
              UPSTREAM_TAG="$TARGET_VERSION"
            elif [[ "$TARGET_VERSION" == v* ]]; then
              UPSTREAM_TAG="geph5-client-$TARGET_VERSION"
            else
              UPSTREAM_TAG="geph5-client-v$TARGET_VERSION"
            fi
            echo "Manual target tag provided: $UPSTREAM_TAG"
            FORCE_BUILD="true"
          else
            # Fix: Use native git command to bypass API pagination limits.
            # 1. Fetch ALL remote tags.
            # 2. Extract just the tag names.
            # 3. Filter for tags starting with 'geph5-client-v'.
            # 4. Remove dereferenced annotated tags (those ending in ^{}).
            # 5. Use Version Sort (-V) to properly sort numbers (e.g. 0.2.9 < 0.2.10).
            # 6. Grab the highest version.
            UPSTREAM_TAG=$(git ls-remote --tags https://github.com/geph-official/geph5.git \
              | awk -F/ '{print $3}' \
              | grep '^geph5-client-v' \
              | grep -v '\^{}' \
              | sort -V \
              | tail -n 1)
            
            if [ -z "$UPSTREAM_TAG" ]; then
              echo "Error: Could not find any upstream tags starting with 'geph5-client-'."
              exit 1
            fi
            echo "Latest upstream tag: $UPSTREAM_TAG"
          fi

          # Check if this EXACT release tag already exists in YOUR repository
          # We use curl to extract only the HTTP status code (200 = exists, 404 = not found)
          HTTP_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/${{ github.repository }}/releases/tags/$UPSTREAM_TAG")
          echo "Local release check for $UPSTREAM_TAG returned HTTP status: $HTTP_STATUS"          
          
          # Evaluate build logic based on existence or force override
          if[ "$FORCE_BUILD" == "true" ]; then
            echo "Build forced!"
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          elif[ "$HTTP_STATUS" == "404" ]; then
            echo "Tag $UPSTREAM_TAG does not exist locally. Proceeding to build!"
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          elif [ "$HTTP_STATUS" == "200" ]; then
            echo "Release $UPSTREAM_TAG already exists in your repo. Skipping build."
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "Unexpected API response ($HTTP_STATUS). Assuming no update needed to prevent loops."
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.architecture }}
    needs: check-updates
    # Only proceed if a new update was found or if triggered manually
    if: needs.check-updates.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            # Using 'musl' enforces statically linked C-libraries (single-file binaries)
            target: x86_64-unknown-linux-musl
            target_cpu: znver5
          - architecture: arm64
            target: aarch64-unknown-linux-musl
            target_cpu: cortex-a53

    steps:
      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: geph-official/geph5
          ref: ${{ needs.check-updates.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build optimized geph5-client
        env:
          RUSTFLAGS: "-C target-cpu=${{ matrix.target_cpu }}"
        run: |
          cross build --release --target ${{ matrix.target }} --manifest-path binaries/geph5-client/Cargo.toml --features "aws_lambda" --config 'profile.release.lto="fat"' --config 'profile.release.strip="symbols"'

      - name: Prepare standalone binary
        run: |
          mkdir -p dist
          # Rename for clearer OS/Architecture distinction
          mv target/${{ matrix.target }}/release/geph5-client dist/geph5-client-linux-${{ matrix.architecture }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: geph5-client-linux-${{ matrix.architecture }}
          path: dist/geph5-client-linux-${{ matrix.architecture }}

  release:
    name: Create GitHub Release
    needs: [check-updates, build]
    if: needs.check-updates.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential permission to allow publishing
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-updates.outputs.tag }}
          name: Release ${{ needs.check-updates.outputs.tag }}
          files: |
            artifacts/geph5-client-linux-amd64/geph5-client-linux-amd64
            artifacts/geph5-client-linux-arm64/geph5-client-linux-arm64
          body: |
            Automatically compiled from upstream `geph-official/geph5`.
            
            - **Upstream Tag Built:** `${{ needs.check-updates.outputs.tag }}`
            - **Binary Details:** Fully statically linked (single portable file) via `musl`.
            - **Features:** `aws_lambda`
            - **Optimizations Applied:** `LTO=fat`, `strip=symbols`, CPU-specific targeting.
