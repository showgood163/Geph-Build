name: Auto-build Upstream geph5-client

on:
  schedule:
    - cron: '0 * * * *' # Automatically check for updates every hour
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force a build regardless of version changes'
        type: boolean
        default: false

jobs:
  check-updates:
    name: Check Cargo.toml Version
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      version: ${{ steps.check.outputs.version }}
      commit: ${{ steps.check.outputs.commit }}
    steps:
      - name: Detect exact commit of version change
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Clone the upstream repository (partial clone for speed)
          git clone --filter=blob:none https://github.com/geph-official/geph5.git upstream_repo
          cd upstream_repo
          
          # 2. Extract the exact line that defines the version in Cargo.toml
          # grep -m1 ensures we only get the first top-level [package] version
          VERSION_LINE=$(grep -m1 -E '^version\s*=' binaries/geph5-client/Cargo.toml)
          UPSTREAM_VERSION=$(echo "$VERSION_LINE" | cut -d '"' -f 2)
          echo "Upstream version in master: $UPSTREAM_VERSION"
          
          # 3. Get the latest release tag from YOUR local repository
          LOCAL_TAG=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name // empty')
          LOCAL_VERSION=${LOCAL_TAG#v} # Strips the 'v' prefix if it exists
          echo "Local released version: $LOCAL_VERSION"
          
          FORCE_BUILD="${{ github.event.inputs.force_build }}"
          
          # 4. Compare versions
          if [ "$UPSTREAM_VERSION" != "$LOCAL_VERSION" ] || [ "$FORCE_BUILD" == "true" ]; then
            echo "Version change detected or build forced!"
            
            # 5. Find the exact commit that introduced this version string.
            # `git log -G` searches the patch diffs for the version string.
            # `tail -n 1` ensures we grab the *oldest* commit that made this change 
            # (i.e., the exact commit where the version was bumped).
            TARGET_COMMIT=$(git log -G "^$VERSION_LINE$" --format=%H -- binaries/geph5-client/Cargo.toml | tail -n 1)
            
            # Fallback if the regex search somehow misses: get the latest commit of that file
            if[ -z "$TARGET_COMMIT" ]; then
              TARGET_COMMIT=$(git rev-list -1 HEAD -- binaries/geph5-client/Cargo.toml)
            fi
            
            echo "Target exact commit: $TARGET_COMMIT"
            
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "commit=$TARGET_COMMIT" >> $GITHUB_OUTPUT
            echo "version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          else
            echo "You are already up to date."
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.architecture }}
    needs: check-updates
    # Only proceed if a new update was found or if triggered manually
    if: needs.check-updates.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            # Using 'musl' enforces statically linked C-libraries (single-file binaries)
            target: x86_64-unknown-linux-musl
            target_cpu: znver5
          - architecture: arm64
            target: aarch64-unknown-linux-musl
            target_cpu: cortex-a53

    steps:
      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: geph-official/geph5
          # We checkout the specific commit hash we found in the check step
          ref: ${{ needs.check-updates.outputs.commit }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build optimized geph5-client
        env:
          RUSTFLAGS: "-C target-cpu=${{ matrix.target_cpu }}"
        run: |
          cross build --release --target ${{ matrix.target }} --manifest-path binaries/geph5-client/Cargo.toml --features "aws_lambda" --config 'profile.release.lto="thin"' --config 'profile.release.strip="symbols"'

      - name: Prepare standalone binary
        run: |
          mkdir -p dist
          # Rename for clearer OS/Architecture distinction
          mv target/${{ matrix.target }}/release/geph5-client dist/geph5-client-linux-${{ matrix.architecture }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: geph5-client-linux-${{ matrix.architecture }}
          path: dist/geph5-client-linux-${{ matrix.architecture }}

  release:
    name: Create GitHub Release
    needs: [check-updates, build]
    if: needs.check-updates.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential permission to allow publishing
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-updates.outputs.latest_tag }}
          name: Release ${{ needs.check-updates.outputs.latest_tag }}
          files: |
            artifacts/geph5-client-linux-amd64/geph5-client-linux-amd64
            artifacts/geph5-client-linux-arm64/geph5-client-linux-arm64
          body: |
            Automatically compiled from upstream `geph-official/geph5`.
            
            - **Upstream Tag:** `${{ needs.check-updates.outputs.latest_tag }}`
            - **Binaries:** Fully statically linked (single portable file) via `musl`.
